        "title": "Дельта-правило",
        "content": "# Дельта-правило\n\nОдной из первых моделей нейросетей является персептрон Розенблатта (Ф. Розенблатт, 1958 г.) –\nустройство для распознавания изображений (букв латинского алфавита).\n\nРассмотрим процесс обучения персептрона, состоящего из одного нейрона. Обучение персептрона – это\nобучение с учителем (должно существовать обучающее множество).\n\n## Принцип действия персептрона на примере решения конкретной задачи (классификация цифр на чётные и нечётные). { #principles }\n\n1) Формирование входных сигналов xᵢ: на матрицу, состоящую из 12 фотоэлементов, накладывается\n   карточка с изображением цифры, если на фотоэлемент попадает фрагмент цифры, то он вырабатывает\n   сигнал в виде единицы, в противном случае – ноль.\n\n2) Генерация значения порога чувствительности нейрона: датчиком случайных чисел присваивается\n   некоторое малое случайное значение.\n\n3) Генерация начальных значений весовых коэффициентов wᵢ: датчиком случайных чисел всем весовым\n   коэффициентам присваиваются некоторые малые случайные значения.\n\n4) Вычисление:\n$$\nS = \\sum_{i=1}^{n} w_i x_i\n$$\n\n5) Вычисление выходного сигнала $y = f(S)$ по пороговой активационной функции.\n\n## Принцип действия персептрона на примере решения конкретной задачи (классификация цифр на чётные и нечётные). { #opppp }\n\n1) Формирование входных сигналов xᵢ: на матрицу, состоящую из 12 фотоэлементов, накладывается\n   карточка с изображением цифры, если на фотоэлемент попадает фрагмент цифры, то он вырабатывает\n   сигнал в виде единицы, в противном случае – ноль.\n\n2) Генерация значения порога чувствительности нейрона: датчиком случайных чисел присваивается\n   некоторое малое случайное значение.\n\n3) Генерация начальных значений весовых коэффициентов wᵢ: датчиком случайных чисел всем весовым\n   коэффициентам присваиваются некоторые малые случайные значения.\n\n4) Вычисление:\n   $$\n   S = \\sum_{i=1}^{n} w_i x_i\n   $$\n\n5) Вычисление выходного сигнала $y = f(S)$ по пороговой активационной функции.\n\n\n## Принцип действия персептрона на примере решения конкретной задачи (классификация цифр на чётные и нечётные). { #opppp2 }\n\n1) Формирование входных сигналов xᵢ: на матрицу, состоящую из 12 фотоэлементов, накладывается\n   карточка с изображением цифры, если на фотоэлемент попадает фрагмент цифры, то он вырабатывает\n   сигнал в виде единицы, в противном случае – ноль.\n\n2) Генерация значения порога чувствительности нейрона: датчиком случайных чисел присваивается\n   некоторое малое случайное значение.\n\n3) Генерация начальных значений весовых коэффициентов wᵢ: датчиком случайных чисел всем весовым\n   коэффициентам присваиваются некоторые малые случайные значения.\n\n4) Вычисление:\n   $$\n   S = \\sum_{i=1}^{n} w_i x_i\n   $$\n\n5) Вычисление выходного сигнала $y = f(S)$ по пороговой активационной функции.\n\n> Это цитата\n> многострочная\n\nИнлайн код: `const x = 1`\n\n```ts\nconst greet = (name: string) => {\n  return `Hello, ${name}`;\n};\n```\n\n![Картинка](https://picsum.photos/400 \"Подпись\")\n\n\n| Колонка 1 | Колонка 2 | Колонка 3 |\n|:----------|:----------|:----------|\n| Лево      | Центр     | Право     |\n| данные    | данные    | данные    |\n",
