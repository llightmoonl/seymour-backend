info:
  name: All Research
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/research?page=1&limit=20&search=&filter=hebbian"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "20"
      type: query
    - name: search
      value: ""
      type: query
    - name: filter
      value: hebbian
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
